<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Classical Music Library</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* 은은하고 고급스러운 카드 인터랙션 효과 */
        .custom-card { 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            position: relative;
            overflow: hidden;
        }
        .custom-card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 0;
            background-color: #475569; /* slate-600 */
            transition: width 0.25s ease;
        }
        .custom-card:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 6px 20px rgba(27, 38, 59, 0.06);
            border-color: #cbd5e1;
        }
        .custom-card:hover::before {
            width: 4px; /* 마우스 올렸을 때 왼쪽에 생기는 세련된 포인트 선 */
        }
    </style>
</head>

    <header class="bg-slate-900 text-white py-8 px-4 text-center shadow-sm mb-6 border-b border-slate-800">
        <h1 class="text-2xl md:text-3xl font-serif font-bold tracking-wider mb-2 text-slate-100">My Classical Music Library</h1>
        <p class="text-slate-400 text-xs font-light tracking-wide">내가 좋아하는 클래식 음악 리스트</p>
    </header>

    <main class="max-w-4xl mx-auto px-4">
        
        <section class="bg-white p-5 rounded-xl shadow-xs border border-stone-200/80 mb-6">
            <div class="grid grid-cols-1 sm:grid-cols-3 gap-3 mb-4">
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-400">
                        <i class="fas fa-search text-xs"></i>
                    </span>
                    <input type="text" id="searchInput" placeholder="작곡가 이름 검색..." class="w-full pl-8 pr-3 py-2 bg-stone-50 border border-stone-200 rounded-lg focus:outline-none focus:border-slate-500 focus:bg-white transition text-xs">
                </div>
                <select id="categoryFilter" class="w-full px-3 py-2 bg-stone-50 border border-stone-200 rounded-lg focus:outline-none focus:border-slate-500 focus:bg-white transition text-xs text-slate-600"></select>
                <select id="sortOrder" class="w-full px-3 py-2 bg-stone-50 border border-stone-200 rounded-lg focus:outline-none focus:border-slate-500 focus:bg-white transition text-xs text-slate-600">
                    <option value="default">내가 정한 순서 (기본)</option>
                    <option value="composer">작곡가순</option>
                    <option value="yearAsc">제작년도순</option>
                </select>
            </div>
            <div class="flex gap-2 justify-end flex-wrap border-t border-stone-100 pt-3">
                <button id="btnShowAll" class="px-4 py-1.5 bg-stone-100 hover:bg-stone-200 text-slate-600 font-medium rounded-lg text-xs transition">전체보기</button>
                <button id="btnAddTrack" class="px-4 py-1.5 bg-slate-700 hover:bg-slate-800 text-white font-medium rounded-lg text-xs transition shadow-xs"><i class="fas fa-plus mr-1.5 text-[10px]"></i>새로운 곡 추가</button>
            </div>
        </section>

        <div id="loadingStatus" class="text-center py-16 text-slate-400 font-light">
            <i class="fas fa-circle-notch fa-spin mr-2 text-slate-500"></i> 아카이브를 불러오는 중입니다...
        </div>
        
        <section id="libraryGrid" class="grid grid-cols-1 gap-3 hidden">
            </section>
    </main>

    <div id="trackModal" class="fixed inset-0 bg-slate-900/40 backdrop-blur-xs flex items-center justify-center p-4 hidden z-50">
        <div class="bg-white rounded-xl shadow-xl max-w-md w-full p-6 border border-stone-100 animate-fadeIn">
            <h2 id="modalTitle" class="text-base font-bold text-slate-900 mb-4 pb-2 border-b border-stone-100">곡 정보 수정 및 링크</h2>
            <input type="hidden" id="modalTrackId">
            
            <div class="space-y-3.5 mb-6">
                <div>
                    <label class="block text-xs font-semibold text-slate-500 mb-1">작품명</label>
                    <input type="text" id="modalTitleInput" class="w-full px-3 py-2 border border-stone-200 rounded-lg focus:outline-none focus:border-slate-500 text-xs">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-500 mb-1">작곡가</label>
                    <input type="text" id="modalComposerInput" class="w-full px-3 py-2 border border-stone-200 rounded-lg focus:outline-none focus:border-slate-500 text-xs">
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-xs font-semibold text-slate-500 mb-1">작곡 연도 (숫자)</label>
                        <input type="number" id="modalYearInput" class="w-full px-3 py-2 border border-stone-200 rounded-lg focus:outline-none focus:border-slate-500 text-xs">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-500 mb-1">장르/분류</label>
                        <input type="text" id="modalCategoryInput" class="w-full px-3 py-2 border border-stone-200 rounded-lg focus:outline-none focus:border-slate-500 text-xs" placeholder="예: 협주곡, 독주곡">
                    </div>
                </div>
            </div>

            <div class="flex justify-between items-center gap-2">
                <a id="btnYoutube" target="_blank" class="px-3 py-2 bg-red-50 hover:bg-red-100 text-red-700 font-semibold rounded-lg text-xs transition flex items-center gap-1.5">
                    <i class="fab fa-youtube text-red-600"></i> 유튜브 검색
                </a>
                <div class="flex gap-2">
                    <button id="btnCancelModal" class="px-3 py-2 bg-stone-100 hover:bg-stone-200 text-slate-600 font-medium rounded-lg text-xs transition">취소</button>
                    <button id="btnSaveModal" class="px-3 py-2 bg-slate-800 hover:bg-slate-950 text-white font-medium rounded-lg text-xs transition">저장하기</button>
                </div>
            </div>
        </div>
    </div>
